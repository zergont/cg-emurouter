<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Эмулятор CG</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    input { width: 90px; }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; }
    th, td { border: 1px solid #ddd; padding: 6px; font-size: 13px; }
    th { background: #f5f5f5; }
    .equip-table { margin: 8px 0 16px 20px; width: calc(100% - 20px); }
    button { padding: 6px 10px; }
  </style>
</head>
<body>
  <h2>Эмулятор CG</h2>
  <div class="row"><small id="version"></small></div>
  <div class="row">
    <div><strong>Буфер воспроизведения:</strong> <span id="replayBuffer">0 / 0 сообщений</span></div>
    <div><strong>Режим:</strong> <span id="replayMode">Live</span></div>
    <div><strong>Скорость воспроизведения:</strong> <span id="replayRate">0 msg/sec</span></div>
    <div><strong>Отброшено:</strong> <span id="replayDropped">0</span></div>
  </div>

  <div class="row">
    <label>Количество объектов: <input id="objectCount" type="number" value="3" min="1"></label>
    <label>Мин. оборудования: <input id="minEquip" type="number" value="1" min="1"></label>
    <label>Макс. оборудования: <input id="maxEquip" type="number" value="3" min="1"></label>
    <label>Период оборудования (сек): <input id="periodSec" type="number" value="5" min="1"></label>
  </div>

  <div class="row">
    <button id="createBtn">Создать/Пересоздать объекты</button>
    <button id="startBtn">Пуск</button>
    <button id="stopBtn">Стоп</button>
    <strong id="status"></strong>
  </div>

  <div id="content"></div>

  <script src="/app.js"></script>
</body>
</html>
