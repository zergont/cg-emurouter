<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cg-emulator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    input { width: 90px; }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; }
    th, td { border: 1px solid #ddd; padding: 6px; font-size: 13px; }
    th { background: #f5f5f5; }
    .equip-table { margin: 8px 0 16px 20px; width: calc(100% - 20px); }
    button { padding: 6px 10px; }
  </style>
</head>
<body>
  <h2>cg-emulator</h2>

  <div class="row">
    <label>N: <input id="objectCount" type="number" value="3" min="1"></label>
    <label>min_equip: <input id="minEquip" type="number" value="1" min="1"></label>
    <label>max_equip: <input id="maxEquip" type="number" value="3" min="1"></label>
    <label>equipment_period_sec: <input id="periodSec" type="number" value="5" min="1"></label>
  </div>

  <div class="row">
    <button id="createBtn">Создать/Пересоздать объекты</button>
    <button id="startBtn">Start</button>
    <button id="stopBtn">Stop</button>
    <strong id="status"></strong>
  </div>

  <div id="content"></div>

  <script src="/app.js"></script>
</body>
</html>
