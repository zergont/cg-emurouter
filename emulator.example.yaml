# Настройки веб-интерфейса
web:
  bind_ip: "0.0.0.0"  # IP-адрес для прослушивания (127.0.0.1 — только локально, 0.0.0.0 — все интерфейсы)
  port: 6666           # Порт веб-интерфейса

# Подключение к MQTT-брокеру
mqtt:
  host: "10.10.10.1"                  # Адрес MQTT-брокера
  port: 1883                          # Порт MQTT-брокера
  topic_prefix: "cg/v1/telemetry/SN" # Префикс топика; к нему добавляется серийный номер объекта
  client_id_prefix: "cg-emulator"    # Префикс ClientId; к нему добавляется серийный номер объекта
  protocol: "v5"                     # Версия протокола MQTT: v5 или v311
  qos: 0                             # Уровень QoS публикации (0, 1 или 2)

# Буфер повтора при недоступности брокера
replay:
  rate_per_sec: 10      # Скорость отправки накопленных сообщений при восстановлении связи, сообщ./с
  buffer_max_size: 1000 # Максимальный размер буфера (при переполнении удаляются самые старые сообщения)

# Параметры эмуляции по умолчанию
defaults:
  gps_period_sec: 60       # Период отправки GPS-сообщений, с
  equipment_period_sec: 5  # Период отправки PCC-сообщений (телеметрия оборудования), с
  gps_drift_m: 300         # Максимальный радиус дрейфа GPS-координаты от фиксированной точки, м
  rf_anchor_offset_km: 50  # Максимальный разброс начальной точки объекта от опорного якоря, км

# Параметры рандомизации симуляции объектов и оборудования
sim:
  # Номинальная мощность (регистр 3019)
  nominal_power_min_kw: 5000   # Минимальная номинальная мощность, кВт
  nominal_power_max_kw: 20000  # Максимальная номинальная мощность, кВт
  nominal_power_step_kw: 1000  # Шаг дискретизации при выборе номинальной мощности, кВт

  # Начальные значения счётчиков наработки
  engine_time_initial_max: 10000000  # Макс. начальное значение счётчика наработки двигателя (рег. 70), с
  controller_time_initial_max: 10000 # Макс. начальное значение счётчика работы контроллера (рег. 290), с

  # Длительности состояний автомата состояния (регистр 6109)
  state0_min_sec: 1800    # Мин. время нахождения в состоянии 0 (простой), с — 30 мин
  state0_max_sec: 7200    # Макс. время нахождения в состоянии 0 (простой), с — 2 ч
  state1_dur_sec: 60      # Длительность состояния 1 (запрос пуска), с
  state2_dur_sec: 60      # Длительность состояния 2 (пуск), с
  state3_dur_sec: 900     # Длительность состояния 3 (прогрев), с
  state4_min_sec: 7200    # Мин. время нахождения в состоянии 4 (работа), с — 2 ч
  state4_max_sec: 172800  # Макс. время нахождения в состоянии 4 (работа), с — 48 ч
  state5_dur_sec: 1800    # Длительность состояния 5 (плановый останов), с
  state6_dur_sec: 60      # Длительность состояния 6 (аварийный останов), с

  # Модель нагрузки (регистр 34)
  load_min_factor: 0.3  # Нижняя граница нагрузки в долях от номинальной мощности
  load_max_factor: 0.9  # Верхняя граница нагрузки в долях от номинальной мощности
  load_hold_min_sec: 60   # Мин. время удержания выбранного уровня нагрузки, с
  load_hold_max_sec: 600  # Макс. время удержания выбранного уровня нагрузки, с

  # GPS
  satellites_min: 3   # Минимальное число видимых спутников
  satellites_max: 12  # Максимальное число видимых спутников

# Уровень журналирования
logging:
  level: "Information"  # Уровень логирования: Trace, Debug, Information, Warning, Error
